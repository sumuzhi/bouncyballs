server {
  listen 80;
  server_name your-domain.com;

  root /var/www/bouncyballs/apps/portal/dist;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /admin/ {
    alias /var/www/bouncyballs/apps/admin/dist/;
    try_files $uri $uri/ /admin/index.html;
  }

  location /bouncy-balls/ {
    auth_request /_auth_portal;
    error_page 401 =302 /login?redirect=$request_uri;
    error_page 403 =302 /login?redirect=$request_uri;
    alias /var/www/bouncyballs/apps/client/dist/;
    try_files $uri $uri/ /bouncy-balls/index.html;
  }

  location /gesture-word-match/ {
    auth_request /_auth_portal;
    error_page 401 =302 /login?redirect=$request_uri;
    error_page 403 =302 /login?redirect=$request_uri;
    alias /var/www/bouncyballs/apps/gesture-word-match/dist/;
    try_files $uri $uri/ /gesture-word-match/index.html;
  }

  location = /_auth_portal {
    internal;
    proxy_pass http://127.0.0.1:3000/api/portal/auth/nginx-verify;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header X-Original-URI $request_uri;
    proxy_set_header Cookie $http_cookie;
  }

  location /api/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
