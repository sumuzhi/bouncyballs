server {
    listen 80;
    listen 443 ssl;
    listen 443 quic;
    listen [::]:80;
    listen [::]:443 ssl;
    listen [::]:443 quic;
    http2 on;
    server_name sumuzhi.site 42.194.199.170;
    index index.html index.htm default.htm default.html;
    root /www/wwwroot/bouncyballs/apps/portal/dist;
    include /www/server/panel/vhost/nginx/extension/sumuzhi.site/*.conf;
    include /www/server/panel/vhost/nginx/well-known/sumuzhi.site.conf;

    ssl_certificate /www/server/panel/vhost/cert/sumuzhi.site/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/sumuzhi.site/privkey.pem;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_tickets on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    add_header Alt-Svc 'quic=":443"; h3=":443"; h3-29=":443"; h3-27=":443";h3-25=":443"; h3-T050=":443"; h3-Q050=":443";h3-Q049=":443";h3-Q048=":443"; h3-Q046=":443"; h3-Q043=":443"';
    error_page 497 https://$host$request_uri;

    include /www/server/panel/vhost/rewrite/html_sumuzhi.site.conf;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ^~ /admin/ {
        alias /www/wwwroot/bouncyballs/apps/admin/dist/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    location ^~ /bouncy-balls/ {
        alias /www/wwwroot/bouncyballs/apps/client/dist/;
        index index.html;
        try_files $uri $uri/ /bouncy-balls/index.html;
    }

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50M;
    }

    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md) {
        return 404;
    }

    location ~ \.well-known {
        allow all;
    }

    if ($uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$") {
        return 403;
    }

    location ~ .*\.(gif|jpg|jpeg|png|bmp|swf)$ {
        expires 30d;
        error_log /dev/null;
        access_log /dev/null;
    }

    location ~ .*\.(js|css)?$ {
        expires 12h;
        error_log /dev/null;
        access_log /dev/null;
    }

    access_log /www/wwwlogs/sumuzhi.site.log;
    error_log /www/wwwlogs/sumuzhi.site.error.log;
}
