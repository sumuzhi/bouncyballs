<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生字跳跳乐</title>
    <!-- 引入 Matter.js 物理引擎 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="canvas"></canvas>

    <div id="ui-layer">
        <div id="header">
            <h1>三年级生字跳跳乐</h1>
            <p class="subtitle">大声朗读，让汉字跳起来！</p>
        </div>

        <!-- 侧边信息面板 -->
        <div id="info-panel">
            <h2 id="info-char">汉</h2>
            <p id="info-pinyin">hàn</p>
            <img id="stroke-gif" src="" alt="笔画">
            <button id="play-audio-btn" style="display: none;" title="播放读音">🔊</button>
            <div id="info-examples">
                <span class="example-tag">汉字</span>
                <span class="example-tag">汉族</span>
            </div>
            <p style="margin-top: 15px; font-size: 0.9rem; color: #999;">点击生字查看详情</p>
        </div>

        <div id="controls">
            <button id="start-btn">开始游戏</button>
            <button id="pause-btn" disabled>暂停</button>
            <button id="refresh-btn">换一批</button>
            <button id="fullscreen-btn">全屏</button>
            <div class="control-group">
                <label for="sensitivity">灵敏度:</label>
                <input type="range" id="sensitivity" min="0.5" max="5.0" step="0.1" value="2.5">
            </div>
            <div class="control-group">
                <label for="ball-count-percent">生字量:</label>
                <input type="range" id="ball-count-percent" min="1" max="100" value="10" step="1" title="调整显示生字的百分比">
                <span id="ball-count-display" style="font-size: 14px; min-width: 80px;">10% (30个)</span>
            </div>
            <div class="status-indicator">
                <span>声音大小:</span>
                <div id="volume-meter">
                    <div id="volume-bar"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="overlay">
        <div class="modal">
            <h2>👋 小朋友你好！</h2>
            <p>这里有好多三年级要学的生字。</p>
            <p>它们很喜欢听你读书的声音。</p>
            <p><strong>你的声音越大，跳起来的生字就越多哦！</strong></p>
            <p>准备好了吗？点击下面的按钮开始吧！</p>
            <button id="modal-start-btn">我准备好了！</button>
        </div>
    </div>

    <!-- 放大详情模态框 -->
    <div id="detail-modal">
        <div class="detail-card">
            <button class="close-detail-btn">×</button>
            <div class="detail-left">
                <div class="detail-pinyin" id="modal-pinyin">hàn</div>
                <h1 class="detail-char" id="modal-char">汉</h1>
                <div class="detail-examples" id="modal-examples">
                    <span class="detail-example-tag">汉字</span>
                    <span class="detail-example-tag">汉族</span>
                </div>
            </div>
            <div class="detail-right">
                <img class="detail-stroke-gif" id="modal-stroke" src="" alt="笔画动画">
                <button class="detail-audio-btn" id="modal-audio-btn" title="播放读音">🔊</button>
            </div>
        </div>
    </div>

    <!-- 引入外部词汇表 -->
    <!-- <script src="vocabulary.js"></script> -->

    <script src="main.js"></script>
</body>
</html>
